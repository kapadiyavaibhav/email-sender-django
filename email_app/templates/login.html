{% extends "base.html" %}
{% block content %}

<div class="text-center mb-4">
  <h2 class="fw-bold">Login</h2>
  <p style="color:var(--muted);">
    Access your account to manage and send emails.
  </p>
</div>

<div class="d-flex justify-content-center">

  <div class="card-glass position-relative overflow-hidden p-4"
       style="max-width:500px; width:100%;">

    <!-- TOP ACCENT LINE -->
    <div style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:4px;
      background:linear-gradient(90deg,var(--blue),var(--cyan),var(--purple));
    "></div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger mt-3">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" class="mt-4">
      {% csrf_token %}

      <!-- USERNAME / EMAIL -->
      <div class="mb-4">
        <label class="form-label text-light">
          <i class="bi bi-person-fill me-2 text-info"></i>
          Username
        </label>
        <input type="text"
               name="identifier"
               class="form-control neon-input"
               placeholder="Username or Gmail"
               required>
      </div>

      <!-- PASSWORD -->
      <div class="mb-4">
        <label class="form-label text-light">
          <i class="bi bi-lock-fill me-2 text-warning"></i>
          Password
        </label>
        <input type="password"
               name="password"
               class="form-control neon-input"
               placeholder="Enter password"
               required>
      </div>

      <!-- LOGIN BUTTON -->
      <button type="submit" class="btn btn-neon w-100 py-3">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Login
      </button>

    </form>

    <!-- REGISTER LINK -->
    <div class="text-center mt-4">
      <span style="color:var(--muted);">
        Don’t have an account?
      </span>
      <a href="{% url 'register' %}" 
         class="ms-2 text-info text-decoration-none">
        Register
      </a>
    </div>

  </div>

</div>

{% endblock %}
